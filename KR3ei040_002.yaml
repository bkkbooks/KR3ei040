body:
  text: 卷之二胎前章總論胎養十條婦人受胎之後所當戒者曰房事曰飲食曰七情曰起居曰禁忌曰醫藥須預先調養不可少犯以致傷胎難産且子多疾悔之無及古者婦人有孕即居側室不與夫接所以産育無難生子多賢亦少疾病今人不知禁忌縱情恣欲有觸動胎氣而墮者有胎肥碩而難産者有敗精凝裹而礙産者有生子多疾痘瘡稠密者皆不禁房事故也婦人受胎之後最宜調飲食淡滋味避寒暑常得清純和平之氣以養其胎則胎元完固生子無疾今為婦者喜啖辛酸煎炒肥甘生冷之物不知禁口所以脾胃受傷胎則易墮寒熱交雜子亦多疾況多食酸則傷肝多食苦則傷心多食甘則傷脾多食辛則傷肺多食鹹則傷腎隨其食物傷其臟氣血氣筋骨失其所養子病自此生矣又如食兔肉則兒缺唇食羊肉則兒多白睛食犬肉則兒聲喑之類皆有明驗所宜禁者不然則兒之形體相貌且有不備不全者矣古有胎教凡視聽言動莫敢不正喜怒哀樂莫敢不慎故其子女多賢此非賢母不能也蓋過喜則傷心而氣散怒則傷肝而氣上思則傷脾而氣鬱憂則傷肺而氣結恐則傷腎而氣下母氣既傷子氣應之未有不傷者也其母傷則胎易墮其子傷則臟氣不完病此多矣盲聾喑啞癡呆癲癇皆稟受不正之故也婦人受胎之後常宜行動往來使血氣通流百脈和暢自無難産若好逸惡勞好靜惡動貪臥養嬌則氣停血滯臨産多難況行立坐臥之久為筋骨肌膚之有傷子在腹中氣通於母必有傷者又勿登高勿臨深勿越險勿負重少有觸動其胎必墮婦人懷胎欲其生男賢則令睹書史操弓矢欲其生女美則令觀鸞鳳牡丹凡忌食之物忌用之藥不可輕犯逐月胎神所占之物不可觸犯以致墮胎睡臥之處要人護從不可獨寢邪氣易侵虛險之處不可往來恐其墮跌妊娠在於清熱養血條實黃芩為安胎聖藥清熱故也置水中取沉者為佳俗人不知以為害而不收用又謂溫經之藥可養胎氣誤人多矣養胎全在脾胃譬之鐘懸於梁梁軟則鐘下墜梁斷則鐘下墮故白朮補脾為安胎要藥胎中痛者非縮砂不止必擇連殼者捶碎用之妊娠七個月以後須用枳殼大腹皮則易産行氣開滯故也孕婦有疾只以和胎安胎為本所感外傷內傷之證以末治之孕婦有疾必擇其專門平日無失者用之若未試之醫有毒之藥不可輕用以貽後悔又不可輕用針灸以致墮胎妊娠惡阻惡阻者謂有胎氣噁心阻其飲食也其症顏色如故脈息平和但覺肢體沉重頭目昏眩擇食惡聞食氣好食酸鹹甚者或作寒熱心中憒悶嘔吐痰水胸膈煩滿恍惚不能支持輕者不服藥無妨乃常病也重者須少藥調之恐傷胎氣專主行痰以二陳湯為主但半夏有動胎之性不可輕用肥人專主痰治半夏茯苓湯主之即二陳湯加砂仁也陳皮半夏湯泡七次炒黃各一錢半茯苓一錢甘草五分砂仁八分薑棗引烏梅半個水煎食遠服再加白朮錢半尤妙又傳云二陳湯加桂枝甚效瘦人兼痰兼熱治之人參橘皮湯主之人參陳皮白朮各一錢麥冬七分甘草五分厚朴姜炒錢半茯苓錢半姜引竹茹一團水煎食遠服再加黃芩尤佳惡阻甚不能食者保生湯主之人參甘草砂仁炒研各一錢白朮香附童便制烏梅陳皮各一錢五分姜引水煎服胎動不安如脾胃素弱不能管束其胎氣血素衰不能滋養其胎不以日月多少而常墮者安胎飲主之更服杜仲丸胡連丸尤佳安胎飲黃芩條實白朮人參歸身生地陳皮白芍各一錢炙草五分砂仁連殼炒捶碎五分薑棗引食前服杜仲丸治胎動不安防其墮者預宜服之杜仲薑汁炒川續斷酒洗各二兩共末煮紅棗肉杵和為丸每服三十丸米飲下此方宜與胡連丸同服胡連丸安胎之聖藥也條芩沉水者四兩白朮無油者二兩蓮肉去心二兩砂仁微炒一兩炙草一兩共末山藥五兩作糊為丸米飲下二方一日二服前服胡連丸空心服杜仲丸如因房事過度有觸動不安者四物去川芎加砂仁阿膠湯主之歸身熟地阿膠炒各一錢炙草砂仁炒各五分竹茹水煎調男子裩襠灰一錢服忌房事免致再墮如因七情觸動胎氣不安者加味四物湯主之四物為主歸身白芍生地酒洗各一錢川芎八分如因怒傷肝者主胞絡本方加黃芩一錢五分人參柴胡甘草各一錢如因憂悲傷肺者本方加黃芩阿膠蘇葉各一錢五味十三粒炙草五分如因恐傷腎者主胞胎本方加川續斷黃柏炒杜仲炒各一錢五味十五粒改用熟地如因思慮積久不解傷脾者本方加白朮錢半人參陳皮香附各一錢炙草五分如因喜樂太過傷心者本方加條芩黃連白朮麥冬各一錢炙草五分如因跌撲觸動者安胎和氣飲主之歸身白芍各一錢白朮黃芩蘇葉各一錢五分炙草砂仁各五分薑棗引水煎食前服如因犯胎神所占方位胎動不安者用上安胎和氣飲主之此上二證並用安胎和氣飲如見血動即加阿膠艾葉妊娠漏胎漏胎者謂既有孕而復血下也女子之血在上為乳汁在下為經水一朝有孕而乳汁經水俱不行者聚於子宮以養胎也今復漏下則是氣虛血虛胞中有熱下元不固也法當用四君子以補其氣四物以補其血黃芩黃柏以清其熱艾葉以止其血杜仲續斷以補下元之虛未有不安者矣增損八物湯主之人參白朮歸身白芍熟地艾葉條芩黃柏知母阿膠炙草各等分薑棗引水煎食遠服兼用杜仲丸見上妊娠傷寒妊娠傷寒專以清熱和胎為主各隨六經所見表裡之證治之務宜謹慎不可與常病傷寒同治以致損胎誤其母子性命也此豫家傳之祕宜珍重之凡得傷寒勿拘日數但見惡寒頭痛發熱即病邪在表也宜用四味紫蘇和胎飲為主蘇葉條芩白朮各一錢半甘草一錢如惡寒頭痛項強腰脊痛此病在太陽經本方加羌活藁本川芎草風各一錢連須蔥三莖姜引水煎熱服以厚衣被蓋之汗出而解如惡寒卻不發熱只頭痛鼻乾或項強此病在陽明經也本方加葛根白芷防風各一錢蔥白三根淡豆豉一撮煎服以汗而解如寒熱往來頭眩或嘔或心下煩或胸脅滿此病在少陽經也本方加柴胡人參各一錢嘔加半夏七分胸脅滿加枳殼桔梗各一錢頭眩加川芎一錢薑棗引如發熱惡寒咳嗽甚者此病在手太陰經也本方加麻黃去根節杏仁各一錢蔥白三根姜引水煎食後服以汗而解如惡寒無熱腹中疼痛吐瀉不渴手足逆冷者此病在足太陰脾經也本方加人參乾薑炙白芍酒炒各一錢薑棗引水煎熱服如惡寒倦臥發熱手足冷者此病在足少陰腎經也本方加獨活熟地細辛各一錢生薑大棗引熱服如惡寒手足厥冷唇口青遍身痛如被杖頭項頂痛者此病在足厥陰經也本方加歸身酒洗吳茱萸炒羌活細辛各一錢連須蔥白三根姜引熱服凡得傷寒勿拘日數但無惡寒無頭痛只發熱口燥咽乾而渴者此病邪在裡用黃龍湯為主各隨所見之症加減治之柴胡人參甘草黃芩各一錢如發熱口渴小便不利者此在手足太陽小腸膀胱腑病也本方加白朮錢半豬苓澤瀉赤茯木通各一錢如其發熱大渴者病在手足陽明胃與大腸也本方加知母一錢石膏捶碎二錢淡竹葉十五皮粳米一撮煎服如大熱大渴躁煩大便不通者此病在足陽明胃腑也本方去人參加枳實炒大黃煨芒硝各一錢半姜引水煎溫服以利為度如發熱口乾而渴心煩不得眠者或乾嘔者此病在足少陽膽腑也本方加麥冬天花粉山梔仁酸棗仁各一錢竹茹一大團煎去渣再煎一沸服如發熱而渴腹中痛自利者此病在足太陰脾經也本方加白朮白芍阿膠炒白茯各一錢引薑棗三枚食前服如發熱而渴利下膿血手足冷者此病在足厥陰肝臟也本方加歸身白芍酒炒白朮白茯各一錢烏梅一個食前服凡傷寒瘥後調理失宜復發熱者此勞復也用黃龍湯加知母麥冬各一錢石膏杵二錢淡竹葉十五皮粳米一撮煎服以汗為度如因飲食失節復發熱者此食復也四味紫蘇和胎飲加枳實炒黃連炒陳皮神麯炒薑棗引水煎食遠服更宜節省免致內傷若天行時氣傳染者只依上法分六經表裡治之無失或於初病之時用敗毒散加和胎藥解之亦是妙方人參羌活柴胡前胡白茯甘草川芎桔梗枳殼黃芩白朮蘇葉葛根姜引蔥白三根水煎熱服蓋覆得汗而解凡病傷寒熱病不解遍身發斑赤如錦紋者加味化斑湯主之人參知母各一錢石膏二錢甘草黃芩梔子仁生地各一錢淡竹葉二十皮豆豉半合水煎食遠服妊娠中風太乙者冬至日在坎正北立春日在艮東北春分日在震正東立夏日在巽東南夏至日在離正南立秋日在坤西南秋分日在兌正西立冬日在乾西北故太乙移宮之日即八節日天必應之以風雨其風自此方而來為正風不能傷人如自沖方而來謂之虛風中人即病中其皮毛經絡者則發寒熱頭項身體皆痛或肌肉頑痹中其筋骨者則拘攣僵直中其臟腑者則卒倒昏悶口眼喎斜手足瘈瘲口噤不語孕婦得此不可用常治中風之法只以補虛安胎為本兼用搜風之劑增損八物湯主之八物內用歸身甘草炙加黃芩黃耆炙羌活防風秦艽各一錢薑棗引水煎多服以平為期妊娠中暑凡盛暑時中其暑熱之毒者其症發熱而渴自汗精神昏憒四肢倦怠少聘清暑和胎飲主之黃耆炙炙草人參白朮黃芩黃連知母麥冬各一錢五味十二粒煎服妊娠中濕凡孕婦或早行感霧露之氣或冒雨或久居下濕之地或大汗出取冷水浴之其症發熱骨節煩痛身體重著頭痛鼻塞黃芩白朮湯主之條芩白朮各五錢蘇葉二錢五分姜五片水煎服妊娠咳嗽如初得之惡風寒發熱鼻塞聲重或鼻流清涕者宜發散加減參蘇飲主之人參紫蘇陳皮白茯甘草桔梗枳殼前胡黃芩各一錢姜引薄荷葉少許水煎食後服得微汗而解久嗽不已謂之子嗽引動其氣恐其墮胎人參阿膠散主之人參白朮白茯炙草蘇葉阿膠炒桔梗各等分水煎食後服妊娠瘧疾凡孕婦病瘧不可輕用截藥恐致損胎柴胡知母湯主之柴胡一錢半人參黃芩知母白朮各一錢甘草五分歸身一錢薑棗引水煎多服以平為期如瘧久不退轉甚者宜與截之七聖散主之經云有故無殞此之謂也柴胡黃芩炙草知母常山酒炒草果仁一錢半烏梅去核三個水酒各半煎臨發五更服宜露一宿湯溫服忌生冷雞魚妊娠霍亂其症心腹絞痛上吐下瀉用前四味紫蘇和胎飲加藿香葉陳皮各一錢砂仁炒五分薑棗引水煎妊娠泄瀉凡孕婦泄瀉以補中安胎為主用四君子湯加白芍一錢更分寒熱治之如發熱而渴者為熱本方加條芩一錢不渴者為寒本方加炒乾姜五分並用烏梅一個為引水煎服如渴瀉久不止者用四君子湯加白芍酒炒訶子肉乾薑炒烏梅去核二個水煎皆食前服如久瀉大渴者人參白朮散主之人參白朮白茯炙草各一錢藿香五分木香乾薑二錢五分作大劑水煎頻頻與之以代湯水效妊娠痢疾凡孕婦痢疾以清熱和胎行氣養血為主虛坐努力者防其損胎當歸黃芩芍藥湯主之當歸白芍黃芩黃連白朮枳殼白茯陳皮生地甘草生各一錢木香五分烏梅一個水煎空心服痢久不止黃連阿膠湯主之黃連炒阿膠炒各一錢木香七分乾薑炒五分人參白朮白茯各一錢炙草五分烏梅三個薑棗引水煎食前服子懸孕婦五六個月以後胎氣不和上湊心腹脹滿疼痛者謂之子懸紫蘇飲主之紫蘇陳皮大腹皮川芎白芍歸身各一錢人參五分炙草五分姜五片蔥白七寸水煎食前服子煩孕婦心驚膽怯終日煩悶不安者謂之子煩人參麥冬散主之人參茯苓黃芩麥冬知母炙草生地各等分竹茹一大團水煎食前服子癇孕婦忽然眩暈卒倒口噤不能言狀如中風須臾即醒醒而復發此名子癇乃氣虛挾痰挾火證也清神湯主之人參白朮白茯白芍炙耆炙草麥冬歸身各等分薑棗引水煎食遠服兼服壽星丸琥珀壽星丸寧神定志去風化痰天南星一斤掘地作坑深二尺用炭火二十斤於坑內燒紅去炭掃淨用好酒五升澆之將南星趁熱放坑內用瓦盆急蓋定以黃泥封固經一宿取出焙乾為末入琥珀末一兩硃砂末五錢和勻以生薑自然汁煮麵糊熟再入獖豬心血三個攪勻和末為丸硃砂為衣每服五十丸人參煎湯下日服三次神效子腫孕婦面目身體四肢浮腫者此胎水泛溢謂之子腫加味五皮湯主之大腹皮桑白皮炒生薑皮茯苓皮白朮紫蘇莖葉各一錢棗去核引水煎服時以木香磨濃汁三匙入內同服子氣孕婦自六七個月以來兩足腫大行步艱難腳指間有黃水出此名子氣亦多有之不須醫治至生子之後其腫自消甚者茯苓湯主之白茯苓白朮陳皮香附烏藥各一錢炙草五分紫蘇五分木瓜三片姜引水煎空心腹孕婦腹大有水氣者亦名子腫鯉魚湯主之白朮三錢白茯苓一錢半歸身白芍各一錢陳皮五分活鯉魚一個煮汁一盞半去魚加生薑五片煎七分空心服子滿孕婦至七八個月其胎長大腹大腹滿逼迫子戶坐臥不安謂之子滿束胎飲主之白朮黃芩蘇葉枳殼大腹皮各一錢半砂仁和殼者略炒五分炙草三分姜引水煎空心服子淋孕婦小便少又澀痛者謂之子淋加味火府湯主之又治溺血木通生地條芩甘草梢麥冬人參赤芍各一錢淡竹葉十五皮燈心四十九寸水煎空心服子鳴氣足時子在腹中鳴者謂之子鳴此由母或缺身向高處取物子在腹中失脫口中所含臍蒂故啼治法或令母作男子拜狀或以豆擲地令母拾之子復含著則止矣又方以鼠窟門土取大塊含之妊娠傷食孕婦傷食腹滿吞酸噁心不喜食者加味六君子湯主之人參五分白朮白茯各一錢炙草三分陳皮一錢半夏曲五分枳實炒神麯炒砂仁炒各五分姜引水煎食後服妊娠頭痛因外感頭痛者此虛也加味芎歸湯主之川芎當歸各一錢半黃芩酒炒白朮各一錢細芽茶二錢為引食後服妊娠目鼻咽喉唇口諸病孕婦專以清熱為主有熱病者俱用東垣涼膈散各隨其症加減主之黃芩黃連山梔仁各酒炒連翹桔梗生草各等分薄荷葉少許目赤痛者本方加當歸川芎羌活防風菊花各一錢竹葉引咽喉痛者本方加牛蒡子炒杵碎一錢口舌生瘡者只依本方姜引鼻衄不止者本方加當歸生地各一錢茅花一大團生薑引妊娠瘡毒孕婦多有病乳癰者托裡解毒湯主之川芎當歸黃芩白芷連翹天花粉金銀花甘草節各一錢青皮五分皂刺七個如背上臀上生者此陽明經也本方去青皮加升麻葛根各一錢如胸前兩頰生者此少陽經也本方去白芷加柴胡膽草梔仁炒各一錢如肩膊腋下生者太陰經也本方去青皮加陳皮桔梗桑白皮天冬各一錢如在胯內陰旁生者厥陰經也本方去白芷倍加青皮如在手足掌內生者少陰經也本方去白芷青皮天花粉加黃連黃柏木通各一錢凡治癰毒要知九不治處不可醫也經云一伏兔腳背二腓腨腳肚三背中脊四五臟俞挾脊兩旁五項對口凶六胸七須八髭九頤雜證二條孕婦忽然無故悲慘哭泣狀若邪祟者此臟躁症也棗麥湯主之甘草三兩小麥一升大棗十枚用水六升煎三升去渣分三服溫飲即效再服竹茹湯數服以和之竹茹湯治孕婦心虛驚恐臟躁悲泣人參麥冬茯苓炙草各一錢小麥一合青竹茹雞子大一團姜三片棗五枚水煎食後服孕婦八九個月忽然暴喑不語者此少陰之脈下養乎胎不能上榮於舌十月生子之後自能言非病也不可服藥勿信庸醫圖利八月章凡孕婦至八九月形盛胎肥腹大坐臥不安者防其難産宜預服瘦胎丸枳殼麩炒四兩白朮當歸甘草各二兩辰砂為衣蜜丸每服五十丸食前白湯下多服瘦胎滑胎自然易産如胎氣本怯不可服上瘦胎丸欲防産難達生散主之大腹皮三錢人參紫蘇莖葉陳皮各五分白朮當歸各一錢甘草五分白芍一錢枳殼七分砂仁五分青蔥五根水煎食前服至十數帖甚得力難産七條一妊娠以血為主以氣為輔氣行則血行氣滯則血滯也富貴之家保愛孕婦惟恐運動任其坐臥以致氣滯而不舒暢血滯而不流通胎不轉動臨産因難甚至悶絶且如貧賤人勤動勞苦生育甚易明可徵矣難産之症宜服前達生散去人參白芍加香附烏藥各一錢二孕婦至六七個月胎形已全不知禁忌恣情交合以致敗精瘀血聚於胞中子大母小臨産必難何以驗之兒子生下頭上有白膜一片滯膩如膠俗呼戴白生者是也此證宜服瘦胎丸蓋因子大母小故也三孕婦之家或問命卜妄談禍福或禱鬼神倉惶憂戚使其孕婦常懷驚恐喪神喪氣又或臨産之時大小慌亂鬧雜往來交頭接耳言三語四孕婦恐怖以致産難試觀不正之女偷生之兒既無産厄子母俱全可以理推若此證必戒命卜止祈禱但令一二慣熟穩婆在房扶持一切閒人杜絶更令言語寬慰勿令驚疑四孕婦臨産之時自覺兒轉動胞漿流出腰腹痛甚目中如火手足俱冷此正産也若兒身未轉胞漿未破腹中陳痛或作或止此名弄産穩婆粗率便令努貢用力太過母力已乏及至産時無力轉運以致産難若此證催生湯丸視其形症用之五孕婦臨産之時胞漿既破兒身既轉著力一送兒即下矣穩婆粗率見其漿破即令使力兒身未轉或轉未順被母努貢逼其快下有逆産者有橫産者有側産者極為凶危若此證惟穩婆之良或可調護保全非醫藥之力也穩婆最忌粗率六少婦初産身體纖渺子宮緊窄當産之時胞漿已破兒欲奔出卻被其母不耐痛苦輾轉傾側兩足不開兒不得出又有中年之婦生育多者氣弱血少當産之時胞破漿下子宮乾澀生理不滑淹延數日如此證子母得全者鮮矣天命使然人力莫及七産育之時氣以行之血以濡之然後子宮滑溜生理順易蓋子猶魚也胞漿猶水也水行魚行水止魚止令産婦胞漿未破之先不當用力而用力太過胞漿既破之後應當用力而力已乏加以憂恐之甚起臥之勞氣閉血阻漿乾水枯所以産難以催生湯丸救之催生四法凡初生一二日間艱難者只以加減五苓散主之豬苓澤瀉白朮茯苓桂車前子木通枳殼檳榔甘草各一錢滑石末二錢燈心四九寸長流水順取煎服連進以子生為度如過二三日人事強實飲食能進者此胞漿乾澀也加味四物湯主之歸尾川芎赤芍生地桂玄胡索枳殼香附檳榔各一錢取水煎服如上調益元散三錢以子生為度如過二三日人事困頓飲食少者此中氣不足不能運動其胎也加味四君子湯主之人參白朮茯苓炙草歸尾川芎枳殼香附桂各一錢取水煎法如上檳榔磨木香濃汁各五七匙入內同服如三四五日不産或胎死腹中何以驗之觀其母之唇舌俱紅者子母無事唇青舌紅者母死子活唇紅舌青者母活子死唇舌俱青者母子俱死奪命丹主之蛇蛻全者一條新瓦上煅存性金銀箔各七片大者母丁香另研五錢男子亂髮燒灰一錢馬嗚蛻即蠶蛻燒灰一錢黑鉛二錢五分水銀七分先將鉛溶化入水銀急炒結成砂子傾出別研千里馬鼻燒灰七個於靜室中修合勿令婦人雞犬見各研為末和勻用獖豬心血為丸如梧子大每服二丸長流水送下如昏悶者研細灌之可以救得臨産須知凡八條凡孕婦未産數日前胎必墜下小便頻數此欲産也慎重之家於合用藥物慣熟穩婆宜預圖之以備不虞其産婦合用之藥物如催生湯丸血暈藥物須要預備如干漆渣又破漆器産時燒之使産母得聞其氣無血暈之疾又燒紅石放盆內以好醋澆之房中轉游數次使産母常聞醋氣亦無血暈又取生韭菜一握放有嘴瓦瓶中以熱醋澆浸塞其大口以嘴向産母鼻嗅之亦止血暈又取無病童男小便五六碗淨器收貯臨産之時即溫一二杯飲之自無血暈産母房中只令穩婆一二人謹閉門戶勿使雜人往來更禁人無事商問大驚小怪直待胞漿已動兒身已轉逼近子門可以用力當此之時産母護痛其身傾側護生者不可抱束其腰恐致損兒但扶其肩膊勿令困倒臨産時如白蜜沸湯薄粥美膳常要齊具如渴則以白蜜半杯溫湯化開飲之以潤燥滑胎令其易産如飢即以薄粥美膳食之令其中氣不乏自然易生如夏月盛暑之時必用冷水灑掃房內解其鬱蒸之氣將四面窗牖大開以薄紙帳遮之使産母溫涼得宜庶新血不妄行以致血暈如冬月嚴寒之時必於房中四處燃火使和暖之氣如春更要閉其戶牖塞其穴隙使邪氣莫入庶免凍産及中風寒之疾臨産時凡合用水火柴炭鍋罐刀剪麻繩線布無一不備臨産禁忌如借地安床埋衣之方不用
