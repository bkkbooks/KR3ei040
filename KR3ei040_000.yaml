body:
  text: 附録回生丹並論何集庵曰回生丹保産之仙藥也數年前有修合施人者臨産服一丸坦然快便不覺其功但聞製藥時必先齊戒虔心發願普濟然後擇一靜室如法遵行同學馬禹琛又在吳門制六百餘丸蒙以十丸見贈余歸即隨手與人癸丑冬日有一難産者子死腹中余聞而急簡笥中尚有一丸送與服之死胎立下母命獲全人咸驚歎余遂發心即日修制廣施迄今丙辰業已四載其間産中艱難諸症無不立效但此方不知始自何人遍簡方書唯萬病回春有之記云長葛孫奎臺經驗較余所傳之方尚有所缺製法湯引亦未講明余特為詳述之列方於下回生丹錦紋大黃一斤為末蘇木三兩打碎用河水五碗煎汁三碗聽用大黑豆三升水浸取殼用絹袋盛殼同豆煮熟去豆不用將殼曬乾其汁留用紅花三兩炒黃色入好酒四碗煎三五滾去渣存汁聽用米醋九斤陳者佳將大黃末一斤入淨鍋下米醋三斤文火熬之以長木箸不住手攪之成膏再加醋三斤熬之又加醋三斤次第加畢然後加黑豆汁三碗再熬次下蘇木汁次下紅花汁熬成大黃膏取瓦盆盛之大黃鍋粑亦剷下入後藥同磨人參二兩當歸一兩酒洗川芎一兩酒洗香附一兩醋炒玄胡索一兩醋炙蒼朮一兩米泔浸炒蒲黃一兩隔紙炒茯苓一兩桃仁一兩去皮尖油川牛膝五錢酒洗甘草五錢炙地榆五錢酒洗川羌活五錢廣橘紅五錢白芍藥五錢酒炒木瓜三錢青皮三錢去穰炒白朮三錢米泔浸炒烏藥二兩半去皮良薑四錢木香四錢乳香二錢沒藥二錢益母草二兩馬鞭草五錢秋葵子二錢熟地一兩三稜五錢醋浸逗紙裹煨五靈脂五錢醋煮化焙乾研細山茱萸肉五錢酒浸濕搗爛入藥酒上三十味並煎黑豆殼共曬乾為末入石臼內下大黃膏拌勻再下煉熟蜜一斤共搗千杵取起為丸每丸重二錢七八分靜室陰乾須二十餘日不可日曬不可火烘干後只重二錢有零溶蠟護之所謂蠟丸也用時去蠟殼調服其湯又各有所宜開列於下臨産用參湯服一丸則分娩全不費力如無參用淡淡炒鹽湯論曰凡胎己成子食母血足月血成塊謂之兒枕將産兒枕先破血裹其子故難産服此丹逐去敗血須臾自生橫生逆産同治亦有因氣血虛損難治者宜多服人參子死腹中因産母染病所致用車前子一錢煎湯調服一丸或二丸至三丸無不下者若因血下太早子死用人參車前子各一錢煎湯服如無參用陳酒少許煎車前湯胎衣不下用炒鹽少許泡湯調服一丸或二三丸即下産畢血暈用薄荷湯調服一丸即醒以上四條乃臨産緊要關頭一時即有名醫措手不及起死回生此丹必須預備産後三日血氣未定還走五臟奔充於肝血暈起止不得眼見黑花以滾水調服此丹即愈産後七日氣血未定因食物與血結聚胸中口乾心悶煩渴滾水下此丹愈産後虛羸血入於心肺熱入於脾胃寒熱似瘧實非瘧也滾水服此丹愈産後敗血走注五臟轉滿四肢停留化為浮腫渴而四肢覺寒乃血腫非水腫也服此丹愈産後敗血熱極心中煩躁言語癲狂非風邪也滾水服此丹愈産後敗血流入心孔閉塞失音用甘菊花三分桔梗三分煎湯調服産未滿月誤食酸寒堅硬之物與物相搏流入大腸不得克化泄痢膿血用山楂煎湯調服生産時百節開張血入經絡停留日久虛脹痠疼非濕證也用蘇梗三分煎湯調服此丹愈産後月中飲食不得應時兼致怒氣余血流入小腸閉塞水道小便澀結溺血似雞肝用木通四分煎湯調服此丹又或流入大腸閉卻肛門大便澀難有瘀而成塊如雞肝者用廣皮三分煎湯調服此丹産後惡露未淨飲食寒熱不得調和以致崩漏形如肝色潮熱煩悶背膊拘急用白朮三分廣皮二分煎湯兼用調服産後敗血入五臟六腑並走肌膚四肢面黃口乾鼻中流血遍身斑點危症也陳酒化服此丹可愈産後小便澀大便閉乍寒乍熱如醉如癡滾水調服此丹以上十三條皆産後敗血為害也故此丹最有奇功至産後一切異症醫所不識人所未經但服此丹無不立安一丸未應二丸三丸必效無疑胎前常服此丹壯氣養胎滋陰順産調和五臟平理陰陽更為神妙室女經閉月水不調衆疾並效調經種玉湯當歸身八錢川芎四錢熟地一兩香附六錢炒白芍六錢酒炒茯苓四錢陳皮三錢吳茱萸三錢丹皮三錢玄胡索三錢若過期而經水色淡者血虛有寒也加官桂炮薑熟艾各一錢若先期三五日色紫者血虛有熱也加條芩三錢銼四帖生薑三片水碗半煎至一碗空心溫服渣再煎臨臥時服經至之日服起一日一服藥完經止即當入房必成孕矣縱未成孕經當對期俟期來再服最效歌曰歸芎熟地香附芍茱萸苓陳丹皮索産前治法産前之證俱照各門治之惟有子懸胎漏胎動最難更可畏者是橫生倒養不可不急講也子懸之症乃胎熱而子不安身欲起立於胞中故若懸起之象其實非子能懸掛也若作氣盛下之立死矣用人參二錢白朮五錢茯苓二錢白芍五錢黃芩三錢杜仲二錢熟地一兩生地三錢歸身二錢此方全是利腰臍之聖藥少加黃芩清之則胎得寒而子自定況方中滋補有餘而寒涼不足蓋胎繫於腰臍之間而胞又結於任沖之際今藥皆直入於內經之中則深根固蒂子即欲動而不能況又有清子之藥有不泰然於下者乎漏胎乃氣血不足之故急宜以峻補之方用人參二錢白朮五錢杜仲二錢枸杞一錢山藥二錢歸身一錢茯苓一錢熟地五錢麥冬二錢北五味五分萸肉二錢甘草一錢水煎服此方不寒不熱安胎之聖藥也凡有胎不安者此方安之神效胎之動也由於男女之癲狂今補其氣血自然鎮定又何至漏胎哉胎動即漏胎之兆亦以此方治之無不神效難産如橫生倒養此死亡頃刻也若無急救之法何以成醫之聖然而胎之不順由於氣血之虧氣血既虧子亦無力往往不能轉順頭遂至先以手出或先腳下矣倘手足先出急以針刺兒之手足則必驚而縮入急用人參一兩歸身三兩川芎二兩紅花三錢速灌之少頃則兒頭直而到門矣倘久而不順再將前藥服之不可止也若兒頭既已到門久而不下此交骨不開之故速用柞木枝一兩歸身二兩川芎一兩人參一兩煎湯服少頃必然一聲響亮兒即生矣倘兒頭不下萬萬不可用柞木枝蓋此味專開交骨兒未回頭而産門先開亦死之道故必須兒頭到門而後可用此方也此産前之法必當熟悉於胸中而後臨産不致倉皇小産治法小産雖無大産之虛而氣血亦大傷矣宜急補之則日後坐胎不致再有崩漏方用人參五錢茯苓三錢熟地一兩杜仲二錢炮姜五分白朮五錢水煎服此方乃補氣補血之聖方胞動而下必損帶脈補其氣血則帶脈損處可以重生他日受孕不致有再損之虞也治胎動方白朮一兩熟地一兩水煎服此方妙在用白朮以利腰臍用熟地以固根本藥品少而功用專所以取效神也此方可以救貧乏之人名黑白安胎散治胎漏方白朮五錢熟地一兩三七根末三錢水煎服此方妙在三七根乃止血神品故奏效如響名止漏絶神丹治産難方難産婦人之常但難産非兒之橫逆實母之氣衰以致兒身不能回轉於是手先出而足先墮矣但見此等生法口中念無上至聖化生佛百遍兒之手足即便縮入急用人參一兩附子一錢歸身二兩川芎五錢黃耆一兩煎湯與之兒身即順立刻産下蓋參耆補氣歸芎補血氣血既足兒易舒展何必服催生之丸哉倘不補氣血而用催生墮胎之藥必致轉利轉虛不殺母即殺子矣又治産難方如胞漿已破血來許久而不生者皆因血氣乾枯所致急宜用歸身四兩川芎一兩益母草二兩人參一兩濃煎湯頻頻與之自無不下如貧不能得許多參即數錢亦可或重用黃耆代之亦可如用黃耆必須三四兩再加附子一錢橫生逆産俱可治佛手散治六七個月後因事跌磕傷胎或子死腹中疼痛不已口噤昏悶或心腹飽滿血上衝心者服之生胎即安死胎即下又治橫生倒産及産後腹痛發熱頭痛逐敗血生新血能除諸疾當歸五錢川芎三錢水七分酒三分同煎七分如橫生倒産子死腹中者加黑馬料豆一合炒焦熟乘熱淬入水中加童便一半煎服少刻再服加味芎歸湯百試百驗萬叫萬靈真神方也此方必兒頭到門方可服當歸一兩川芎七錢龜板手大一片醋炙研末婦人頭髮如雞蛋大瓦上焙存性水二碗煎一碗服如人行五里即生死胎亦下薛云交骨不開者陰氣虛也用此方如神又云上舍某之妻産門不開兩日未生服此方一劑即時而産上舍傳此方用之者無不驗保産神效方未産能安臨産能催偶傷胎氣腰疼腹痛甚至見紅不止勢欲小産危急之際一服即愈再服全安臨産時交骨不開橫生逆産或子在腹中命在垂危服之奇效全當歸酒洗一錢五分真川芎一錢五分紫厚朴薑汁炒七分菟絲子酒泡一錢半川貝母去心淨一錢煎好方和入枳殼麩皮炒六分川羌活六分荊芥穗八分黃耆蜜炙八分蘄艾醋炙五分甘草炙五分白芍藥酒炒一錢二分冬用一錢生薑三片水兩鍾煎八分渣水一鍾煎六分産前空心預服二劑臨産隨時熱服此乃仙授奇方慎勿以庸醫加減其分兩産後治法産後之病不可枚舉總以補氣補血為主産後往往血暈頭痛身熱腹疼或手足逆而轉筋或心脅滿而吐嘔風邪入而變陰寒或涼氣侵而直為厥逆皆死亡定於旦夕而危急亂於須臾也此時若作外證治之藥下喉即變證莫測矣可不慎歟方用人參五錢白朮五錢熟地一兩歸身二兩川芎一兩荊芥末炒黑色二錢此方為主有風感之加柴胡八分有寒入之加附子一錢肉桂一錢其餘諸證俱不可亂加以此方服之無不神效但可或減分兩而不可去取藥味蓋産婦一身之血盡行崩下皮膚腠理如紙之薄邪原易入然亦易出也故於大劑補正之中略加祛邪之藥少黏氣味邪則走出於軀殼之外焉可照平常無病之人慮其邪之難散而重用逐邪之方也方中妙在純是補氣補血之品全不顧邪盡在補正正氣既盛邪氣自遁況方中原有荊芥之妙劑不特引氣血各歸經絡亦能引邪氣各出皮毛此方之所以真奇妙也惟有兒枕痛手按之少痛者宜加入山楂十粒桃仁五個可也一劑即去之余藥萬不可輕用增入也或問熟地三日內可用否曰一日何嘗不可用也産後聖方人參三錢歸身一兩川芎五錢荊芥末一錢炒黑益母草二錢水煎服有風加柴胡五分有寒加肉桂一錢血不淨加山楂十粒血暈加炮姜五分鼻中衄血加麥冬二錢夜熱加地骨皮一錢有食加山楂五粒穀芽一錢有痰加白芥子五分余斷斷不可侵入此方純補氣血而不治表所以為妙屢治産後無不神效又産後聖方産後最宜服參但貧者不易得今酌定一方代之黃耆八錢蜜炙白朮三錢歸身三錢茯苓一錢熟地四錢炙草一錢益母草二錢淮牛膝一錢炮姜一錢如自汗眼花視小為大是將脫也宜服參附湯人參一兩附子一錢或二錢三錢參不可得則前方黃耆可加至二兩更加附子一錢臨産宜服獨參湯參不可得則前方去牛膝炮姜加滑石末二錢産自易此方屆月即可服治乳腫硬方産後諸證悉屬虛惟乳腫硬發熱則暫宜疏滯訂方如下漏蘆瓜蔞橘葉甘草節各一錢青皮通草各八分蒲公英金銀花各二錢二劑即産不可多服小兒開口良方穿山甲一片防風二錢甘草五分煎汁極濃磨穿山甲二三匙開口余搽乳頭上二日後小兒大便出黑屎為驗可免終身一切驚風屢試屢驗小兒開口最忌金黑黃連切不可用小兒免麻痘方俟小兒臍帶落下以新瓦二片上下各一片將臍帶挾在中間焙成炭存性務宜勤視總以煙盡為度取出用碗覆地上去火氣一時取起戥稱如臍炭重一分外用辰砂五釐同臍炭放乳鉢內研成細末另用當歸一錢防風一錢煎流水二三匙調前末與小兒服盡為度三日後小兒通身發出沸瘡樣脫去皮膚即驗終身可免麻痘縱出亦必稀又稀痘神驗方大麻子去殼取肉揀肥白者三十六粒硃砂一錢另研極細末須選紅劈砂為妙真麝香五釐上將硃砂麝香二味共為細末然後入大麻三味共研一處極細成膏子於五月五日午時搽小兒頭頂上前心窩後背心兩手心兩足心兩胯灣並兩脅窩兩腿灣共一十三處俱要搽到勿使藥有餘剩如錢大搽後不可洗動待其自落本年搽過一次出痘數粒次年端午節午時再搽一次出痘一二粒再次年端陽午時又搽一次痘永不出如未過一周小兒於七月七日九月九日亦依前法搽之更妙傳方之家已十六代不出痘有益無損誠寶赤之靈丹也宜留心預備之
