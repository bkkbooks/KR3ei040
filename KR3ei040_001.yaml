body:
  text: 卷之一立科大概夫男女者均稟天地之氣以生有生之後男則氣血俱足女則氣有餘而血不足也至於受病外感內傷之證未嘗不同但女則別有調經胎前産後之治此所以更立一科也調經專以理氣補心脾為主胎前專以清熱補脾為主産後專以大補氣血兼行滯為主此婦人科調治之大略云濟陰通玄賦概論八條陰陽異質男女殊科特立專門之證治以救在室之沉疴因其血之虧也故調之必使流通因其氣之盈也故抑之不使郁遏體本嬌柔性最偏頗肥白者多痰瘦黑者多火胃太過者氣結養不足者血涸專寵愛者治合異乎孤冷飫膏粱者療莫同於藜藿月事時下兮如潮汐之應期血海常滿兮似江漢之流波謂之無病可以勿藥或不及期而先來兮氣有餘而血易虧或過期而後來兮氣不足而血本弱花氣淡淡兮由血室之水虛桃浪紫色兮被胞戶之火灼經未行而腹痛兮氣滯血澀而可調經已行而腹痛兮和氣養血而勿錯或一月再行兮邪火迫而氣血不藏或數月而一行兮元氣虧而生化不多皆是損真之證貴在調理之和滿而不泄兮為經閉為血枯為癥瘕泄而不滿兮為崩中為帶下為漏濁常滿者惡其中滿常泄者慮其氣脫脈惟喜於芤澀診切忌乎洪數或隱忍而病盛兮愚婦自速其亡妄攻補而病增兮庸醫反助其虐經候既調男女可合不出三日之期宜盡應候之媾乾闢坤闔陽唱陰和滴秋露於花枝兮玉粒可結鼓春風於桃浪兮金鱗自躍陰包陽兮則丹桂發芽陽包陰兮則紅蓮吐萼天地之大義生民之本始勿謂芻蕘之言漫作詼諧之謔震風之喜有徵妊娠之脈必確尺數關滑而寸盛陽搏陰別而雀躍精神雖倦兮桃腮更妍飲食粗惡兮天癸不落無妨惡阻之害所慎漏胎之濁熱常要清脾不可弱熱不清兮而胎動不安脾若虛兮而胎危易墮惟以安胎為本其餘雜證為末斯先哲之格言宜後人之守約子懸急痛而勿疑子癇卒倒而可愕子滿胎肥而氣壅子瘧脾虛而氣弱子煩子淋兮胎熱所為子腫子氣兮胎水所作子嗽子痢兮病轉劇而胎損傷寒傷食兮痰若多而成惡常慘常笑兮肺氣結而非祟暴啞不語兮心血虛而勿藥胎若肥而瘦胎速進脈怕微而診脈休錯懷胎之後禁忌不可少犯臨産之前戒慎乃為要約預備藥物審擇穩婆禁譁去疑兮恐産母之心動居安守靜兮令産母之氣和兒身未轉兮坐草不宜太早胞漿既破兮使力未可太過或逆或橫兮在穩婆之妙手若遲若留兮系催生之聖藥醫藥之系非輕母子之命所託差之毫釐甚於水火胎衣未下兮取之有道惡露未盡兮去之勿過血迷血暈兮死生存乎呼吸血脹血痛兮攻擊戒乎揮霍但以補虛為主莫因他病而訛藥喜甘溫兮切忌苦寒脈宜和緩兮最嫌洪數惡阻各歸於臟腑諸病若似於障魔頭旋而常見黑花兮乙木之病聲啞而乍見鬼神兮丁火之疴臍下痛而或淋或祕兮溝瀆塞於汙淤腹中痛而或脹或腫兮倉廩積乎陳莝息逆而喘嗽不寧兮因犯素天之氣腰疼而俯仰不利兮乃沖元海之波煩熱兮責其血去而陰虛羸怯兮知其蓐勞而氣弱能詳察夫證候斯可議乎方藥經候不調兮烏雞可投天癸或阻兮蒼莎宜托地黃補腎兼行參朮養脾莫卻三補涼血兮專治崩中之藥補中暖宮兮能固帶下之脫安胎胡連兮在妊娠為最宜瘦胎達生兮視形證而休錯黑神去惡露而可取胎衣十全補虛羸而能除陰火臨病審證兮請觀設問之辭舉一該百兮勿訝立言之約吐露靈府之珠璣掣開醫門之鎖鑰調經章概論五條謹按經云女子二七而天癸至衝任滿盛月事以時下乃有子故得其常候者為無病不可妄投調經之劑苟或不及期而經先行者或過期而經後行者或一月而經再行者或數月而經一行者或經閉不行者或崩者或漏下者此皆失其常候不可不調也大抵調治之法熱則清之冷則溫之虛則補之滯則行之滑則固之下陷則舉之對證施治以平為期如芩連梔柏清經之藥也丁桂姜附溫經之藥也參朮歸茯補虛之藥也川芎香附青皮玄胡行滯之藥也牡蠣赤石脂棕櫚炭側柏葉固精之藥也升麻柴胡荊芥白芷升舉之藥也隨其證而用之鮮有不效者矣婦人經候不調有三一曰脾虛二曰衝任損傷三曰脂痰凝塞治病之工不可不審脾胃虛弱者經曰二陽之病發心脾女子不月夫二陽者陽明胃也胃主受納五穀長養血氣灌溉臟腑流行經隧乃水穀之海血氣之母也惟憂愁思慮則傷心心氣受傷脾氣失養鬱結不通腐化不行胃雖能受而所謂長養灌溉流行者皆失其令矣故脾胃虛弱飲食減少氣日漸耗血日漸少斯有血枯經閉及血少色淡過期始行數月一行之病衝任損傷者經曰氣以吹之血以濡之故氣行則血行氣止則血止也女子之性執拗偏急忿怒妒忌以傷肝氣肝為血海衝任之系衝任失守血氣妄行也又褚氏曰女子血未行而強合以動其血則他日有難名之疾故女未及二七天癸之期而男子強與之合或於月事適來未斷之時而男子縱欲不已衝任內傷血海不固由斯二者為崩為漏有一月再行不及期而行者矣脂痰凝塞者蓋婦女之身內而腸胃開通無所阻塞外而經隧流利無所礙滯則血氣和暢經水應期惟彼肥碩者膏脂充滿玄室之戶不開挾痰者痰涎壅滯血海之波不流故有過期而經始行或數月而經一行及為濁為帶為經閉為無子之病不及期而經先行如德性溫和素無他疾者責其血盛且有熱也用歸身川芎各七分赤芍生地知母麥冬地骨皮各一錢甘草五分水煎空心服如性急躁多怒多妒者責其氣血俱熱且有郁也用歸身川芎白芍各一錢生地七分條芩炒黃連炒香附童便浸炒杵各一錢生甘草五分水煎服如形瘦素無他疾者責其血熱也用四物加芩連湯四物內用赤芍芩連俱炒各一錢甘草生五分水煎食前服兼服三補丸和之三補丸專治血熱用黃芩黃連黃柏各炒各等分蜜丸白湯下如形瘦素多疾且熱者責其衝任內傷也用歸身白芍熟地人參知母麥冬各一錢川芎七分炙草五分姜三棗二引水煎食前服更宜常服地黃丸地黃丸治女子衝任損傷及腎虛血枯血少血閉之證熟地焙八兩山藥四兩山茱萸去核焙四兩白茯去皮三兩牡丹皮去木三兩澤瀉去毛三兩蜜為丸空心白湯下如曾誤服辛熱暖宮之藥責其衝任伏火也用歸身一錢川芎七分赤芍生地酒洗各一錢黃柏炒知母木通去皮各一錢甘草生五分水煎食前服更服三補丸和之如形肥多痰多郁者責其血虛氣熱也歸身川芎生地薑汁炒各七分陳皮去白半夏滾水泡各五分白茯甘草生各五分條芩炒香附童便浸炒黃連炒各一錢姜引水煎服經過期後行如德性溫和素無疾者責其血虛少也八物湯主之川芎白芍人參白朮茯苓歸身酒甘草生各等分生地酒洗姜三片棗三枚去核水煎食前服如性急躁多怒多妒者責其氣逆血少八物湯加香附湯主之前方加香附童便浸炒青皮等分水煎服兼常服蒼莎丸以調之蒼莎丸和中開鬱蒼朮米泔浸香附童便浸一日夜各三兩條芩炒一兩共末湯浸蒸餅為丸白湯下如形瘦素無他疾者責其氣血俱不足也用十全大補湯主之此湯治氣血兩虛脾胃不足人參黃耆蜜白朮白茯甘草炙當歸酒洗川芎白芍酒生地酒洗各一錢厚桂五分薑棗引煎服如前如形瘦食少責其脾胃衰弱氣血衰少也用異功散加當歸川芎湯主之此方專補脾胃進飲食養氣血人參白朮白茯炙草陳皮歸身酒洗川芎各一錢薑棗引兼服地黃丸如肥人及飲食過多之人責其濕痰壅滯軀肢迫寒也用六君子加歸芎湯主之人參白朮茯苓炙草陳皮去白半夏湯泡七次歸身川芎香附童便浸炒各一錢姜引兼服蒼莎丸如素多疾者責脾胃虛損氣血失養也用參朮大補丸地黃丸參朮大補丸即參苓白朮散加歸芎人參五錢白朮白茯陳皮蓮肉歸身各七錢半甘草炙三錢山藥一兩砂仁川芎石菖蒲各五錢共末荷葉包米煮飯為丸米飲下一月而經再行如性急多怒氣者責其傷肝以動衝任之脈用四物加柴胡湯主之歸身川芎白芍生地柴胡人參條芩甘草生黃連煎服更宜常服補陰丸以瀉衝任之火補陰丸黃柏炒知母去皮等分蜜丸每服五十丸如曾服辛熱之藥者用四物湯加黃柏知母湯及三補丸主之如曾傷衝任之脈者用四物人參知母麥冬湯及地黃丸主之數月而經一行瘦人責其脾胃弱氣血虛用十全大補湯及地黃丸主之肥人責其多痰兼氣血虛用六君子加蒼莎導痰丸主之人參川芎半夏泡各七分甘草五分白朮白茯陳皮去白蒼朮米泔水浸歸身香附童便炒枳殼各一錢蒼莎導痰丸蒼朮泔水浸焙香附童便浸焙各二兩陳皮去白白茯去皮各一兩五錢枳殼麩炒半夏泡七次南星炮去皮炙草各一兩生薑自然汁浸蒸餅為丸淡薑湯下經行或前或後悉從虛治加減八物湯主之人參白朮茯苓歸身川芎白芍酒炒炙草陳皮丹參香附童便浸牡丹皮各一錢薑棗引更宜常服丸藥烏雞丸此丸專治婦人脾胃虛弱衝任損傷血氣不足經候不調以致無子者服之屢驗白烏骨雄雞一隻要未鐓者先以粳米養七日勿令食蟲蟻野物吊死去毛去雜細以一斤為率用生地熟地天冬麥冬各二兩放雞肚中甜美醇酒十碗以沙罐煮爛取出再用桑柴火上焙去藥更以余酒淹盡焙至焦枯研羅為末再加杜仲鹽水炒二兩人參炙草肉蓯蓉酒洗破故紙炒小茴炒各一兩歸身川芎白朮丹參白茯各二兩砂仁一兩香附醋浸三日焙四兩共研末和上末酒調麵糊為丸每服五十丸空心溫酒下或米飲下經期腹痛凡經水將行腰脹腹痛者此氣滯血實也桃仁四物湯主之歸尾川芎赤芍丹皮香附醋浸玄胡索各一錢生地紅花各五分桃仁二十五粒水煎入桃泥在內傾出服如瘦人責其有火加黃連黃芩炒各一錢肥人責其有痰加枳殼蒼朮各一錢凡經水過後腹中痛者此虛中有滯也加減八物湯主之人參白朮茯苓歸身川芎白芍生地各一錢甘草炙木香各五分青皮七分香附醋炒一錢薑棗引經水多少瘦人經水來少者責其血虛少也四物加人參湯主之人參歸身川芎白芍生地香附童便浸炒炙草各一錢薑棗引肥人經水來少者責其痰礙經隧也用二陳加芎歸湯主之陳皮白茯歸身川芎香附童便浸炒枳殼炒各一錢半夏泡七次八分甘草五分滑石二分姜引凡經水來太多者不問肥瘦皆屬熱也四物加芩連湯主之歸身白芍酒洗知母條芩黃連各一錢川芎生地各五分黃柏七分兼服三補丸經水紫色淡色色紫者熱也四物加香附黃連湯主之歸尾川芎赤芍生地香附童便浸黃連炒生草牡丹皮各一錢煎服色淡者虛也八物湯主之人參白朮白茯歸身川芎白芍熟地黃耆香附童便浸各一錢炙草五分薑棗引更常服地黃丸以上各例調經之法並宜於經候行時連進十餘服則下次經候自不愆矣若丸藥則宜常久服之乃效經閉不行婦人女子經閉不行其候有三乃脾胃傷損飲食減少氣耗血枯而不行者法當補其脾胃養其氣血以待氣充血生經自行矣不可妄用通經之劑則中氣益損陰血益干致成癆瘵之疾而不可救所謂索千金於乞丐棰楚日加徒斃其生而已一則憂愁思慮惱怒怨恨氣鬱血滯而經不行者法當開鬱氣行滯血而經自行苟用補劑則氣得補而益結血益凝聚致成癥瘕脹滿之疾所謂養虎自遺患也一則軀肢迫寒痰涎壅滯而經不行者法當行氣導痰使經得行斯謂之良工矣如因脾胃傷損血枯不行者用加減補中益氣湯主之人參白朮各二分炙耆柴胡各七分炙草五分歸身白芍酒洗川芎陳皮各七分神麯炒麥芽炒各五分薑棗引更宜服前參朮大補丸烏雞丸以經行為度如因氣鬱血閉不行者用開鬱二陳湯主之陳皮白茯苓蒼朮香附童便浸川芎各一錢半夏泡炒青皮莪朮煨檳榔各七分甘草木香各五分姜引更宜服四制香附丸以經行為度此丸乃婦人常用之要藥也四制香附丸香附一斤淨杵分四制酒醋鹽水童便各浸三日焙研天台烏藥八兩共末醋糊為丸白湯下如因痰者用前蒼莎導痰丸主之更服上開鬱二陳湯去莪朮加枳殼一錢服之有愆期未嫁之女偏房失寵之妾寡居之婦庵院之尼欲動而不能得遂憾憤而不能得信多有經閉之疾含羞強忍不欲人知致成癆瘵之病終不可救者宜用四制香附丸參朮大補丸攻補兼行庶幾可瘳此七情之變無以法治者也有經閉不行骨蒸潮熱脈虛者增損八物柴胡湯主之人參白茯各一錢炙草五分歸身白芍酒拌炒生地麥冬知母北柴胡有汗加地骨皮無汗加牡丹皮各一錢淡竹葉十五皮煎服凡婦人血虛有熱者皆可服之如熱太甚服此不平者加黑乾薑一錢神效有經閉發熱咽燥唇乾脈實者用四物涼膈散主之歸身川芎赤芍生地黃芩酒炒黃連酒炒山梔酒炒連翹桔梗各一錢生草薄荷葉各五分淡竹葉十皮凡血實形盛脈有力者皆可服之附石瘕石瘕者因行經之時寒風自陰戶而入客於胞門以致經血凝聚月信不行其腹漸大如孕子狀婦人壯盛者半年之後小水長而消矣若虛怯者必成腫病溫經湯主之歸身梢川芎赤芍莪朮煨人參各一錢炙草五分川牛膝破故紙炒杵小茴炒各一錢薑棗引更宜頻服香附丸附腸覃腸覃者因經行之時寒風自肛門而入客於大腸以致經血凝澀月信雖行而血卻少其腹漸大如孕子狀為胎漏狀壯盛婦人半年以後氣盛而除虛怯者必成脹病桂枝桃仁湯主之桂枝檳榔各一錢五分白芍酒炒生地酒洗枳殼麩炒各一錢桃仁二十五粒炙草五分薑棗引煎熟入桃泥去渣服更宜常服四制香附丸以上二證載靈樞經內人鮮知者女科未載焉特表而出之崩漏章崩婦人崩中之病皆因中氣虛不能收斂其血加以積熱在裡迫血妄行故令經血暴下而成崩中崩久不止遂成下漏叔和脈訣云崩中日久為白帶漏下時多腎水枯也治有三法初止血次清熱後補其虛未有不痊者也凡婦人女子初得崩中暴下之病者宜用止血之劑乃急則治其標也四物湯調十灰散服之以血止為度十灰散藕節蓮蓬艾葉棕櫚大小薊根側柏乾薑油發乾漆以上十味各燒存性為灰等分和勻每服三錢或用醋煮糯米粉為丸每服百丸不喜散者用之血止即服清熱之劑用涼血地黃湯主之生地當歸各一錢黃連黃柏知母藁本川芎升麻各五分柴胡羌活防風各七分黃芩炙草細辛荊芥穗蔓荊子各四分紅花一分煎服如血未盡再吞十灰丸血已止裡熱已除宜用補中之劑加味補中益氣湯主之炙耆人參白朮陳皮歸身白芍酒炒熟地各一錢炙草白茯升麻柴胡知母黃柏炒各五分薑棗引更宜早服地黃丸夕服參朮大補丸以平為期漏凡崩久成漏連年不休者此中氣下陷下元不固也宜用前加味補中益氣湯兼服鹿角霜丸主之鹿角霜丸鹿角霜柏子仁去殼炒歸身茯神龍骨煅阿膠蛤粉炒成珠各一兩川芎七錢香附醋炒二兩炙草五錢川續斷兩半共末山藥五兩研作糊為丸每服五十丸空心溫酒下附經血妄行如經血妄行或吐血或唾血或口內血腥用前四物涼膈散加生韭自然汁服之赤白帶下帶下之病婦女多有之赤者屬熱兼虛兼火治之白者屬濕兼虛兼痰治之年久不止者以補脾胃為主兼升提大抵瘦人多火肥人多痰要知此候赤帶用前四物加芩連湯再加升麻丹皮主之兼服三補丸白帶用加味六君子湯主之陳皮半夏泡蒼朮米泔水浸人參各一錢白朮一錢五分白茯一錢二分炙草七分升麻柴胡各五分姜引兼服蒼莎導痰丸帶久不止者專以補虛為主宜服十全大補湯去地黃加陳皮半夏乾薑炒更服參朮大補丸以補脾胃之虛及服補宮丸以固下元之脫補宮丸鹿角霜白茯白朮白芍酒炒白芷牡蠣煅童便淬山藥龍骨煅赤石脂各等分乾薑炒減半醋糊丸空心米飲下白濁白淫白帶辨證婦人常有白帶白濁白淫之疾證既不同治亦有別白帶者時常流出清冷稠黏此下元虛損證也用上帶久不止之法治之白濁者隨小解而來渾濁如泔此胃中濁氣滲入膀胱也加味二陳湯主之陳皮半夏泡白茯白朮蒼朮泔水浸益智仁鹽水炒杵末各一錢炙草五分升麻柴胡七分姜引附遺白帶方酒煮白果三升去心去膜曬乾為末每服二錢白水下白淫者常在小便之後而來亦不多此男精不攝滑而自出不須治即自愈溫經湯婦人行經之時連服三劑易能成孕陳皮半夏生地各一錢歸身尾二錢川芎白芍紅花秦艽烏藥各八分香附一錢半木通三分青皮七分姜引水煎服種子章十二條無男女乾坤或幾乎息矣男女配匹所以廣嗣厥系匪輕勿謂無預於人事生育者必陽道強健而不衰陰癸應候而不愆陰陽交暢精血合凝而胎元易成矣不然陽衰不能下應乎陰陰虧不能上從乎陽陰陽乖離是以無子雖雲天命之有定抑亦人事之未盡歟故種子者男則清心寡欲以養其精女則平心定氣以養其血補之以藥餌濟之以方術是之謂人事之常盡也何謂男貴清心寡欲蓋形樂者易盈志樂者易蕩富貴之人不知御神則蕩必傾不知御形則盈必虧此清心寡欲為男子第一緊要也何謂女貴平心定氣蓋女子以身事人而性多躁以色悅人而情多忌稍不如意即憂思怨怒矣憂則氣結思則氣鬱怨則氣阻怒則氣上血隨氣行氣逆血亦逆此平心定氣為女子第一緊要也藥餌惟何男子宜服地黃丸以補左腎之陰加杜仲蓯蓉巴戟補骨脂沉香以補右腎之陽女子宜服烏雞丸以養其氣血調其經候斯為得理若彼桂附丹石動氣耗陽損血消陰之劑一切遠之何謂濟之以方術如種子之歌素女之論是也宜博求之女人無子多因經候不調藥餌之輔尤不可緩若不調其經候而與之合徒用力於無用之地此調經為女人種子緊要也如肥盛婦人稟受甚厚及恣於酒食之人經水不調不能成胎謂之軀脂滿溢閉塞子宮宜行濕燥痰用前蒼莎導痰丸四制香附丸如瘦怯性急之人經水不調不能成胎謂之子宮乾澀無血不能攝受精氣宜涼血降火用地黃三補丸調之如素有濁漏帶下之人經水不調不能成胎謂之下元虛憊不能聚血受精宜補虛澀脫用前烏雞丸補宮丸調之種子歌云三十時辰兩日半二十八九君須算落紅滿地是佳期經水過時空霍亂霍亂之時枉費工樹頭樹底覓殘紅管教芳花能結子何愁丹桂不成叢此蓋言經水未行之時血海正滿子宮未開不能受精以成其孕經水既行則子宮開血海淨斯能受其精矣然亦自經水初行之時計算三十個時辰足恰兩日半欲種子貴當其時故一日二日三日與之交則多生男四日五日六日與之交則多生女七日之後子宮復閉不必再交矣婦女陰質取象於月若自朔至望經水行不失其候者結胎易生子多壽以月光漸生月輪漸滿也若自望至晦經水行或失其期者胎難結生子多夭如月光漸消月廓漸空也此造化之理可與懵者道之耶素女論中男有三至女有五至如男至而女未至玉體才交瓊漿先吐雖能下應乎陰而陰不從也如女至而男未至則桃浪雖翻玉露無滴雖能上從乎陽而陽不應也所以無子此氣至者亦有先後男女之別如陽精先至陰血後參則精開裹血而成女陰血先至陽精後沖則血開裹精而成男故卜書云陰包陽則桂廷添秀陽包陰則桃洞得仙此之謂也何謂男有三至蓋陰痿而不舉肝氣未至也舉而不堅腎氣未至也堅而不熱心氣未至也肝氣未至而強合則傷肝其精流滴而不射腎氣未至而強合則傷腎其精散漫而不黏聚心氣未至而強合則傷心其精冷而不熱此男子之所以無子貴乎清心寡欲以養肝腎心之氣也何謂女有五至蓋交感之時面赤而熱心氣至也目中涎瀝微睨視人肝氣至也嬌聲低語口鼻氣喘肺氣至也伸舌吮唇以身偎人脾氣至也玉戶開張瓊液流出腎氣至也五氣皆至而與之合則情洽意美陽施陰受有子之道也男女無疾交會應期三虛四忌不可不避三虛者天地晦冥日月薄蝕雷電風雨晦朔弦望天之虛也地震土陷山崩水溢地之虛也憂怒悲恐醉飽勞倦人之虛也犯此三虛則交而不孕孕而不育疾病且生為身之災也四忌者一忌本命正沖甲子庚申滅沒休廢之日二忌大寒大暑大醉大飽之時三忌日月星辰寺觀壇廟灶廁冢墓之處四忌觸忤惱犯罵詈擊搏之事犯此四忌不惟令人無子且致夭也凡種子者當應候之時男服補腎益精之藥女則調其飲食淡其滋味避其寒暑至於夜半生氣乘旺之時依上三至五至三虛四忌行之自然交而必孕孕而必成矣
