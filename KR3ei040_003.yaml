body:
  text: 卷之三產後章產後專以補虛為主其有他疾以末冶之今並催生之法設為問答以盡病源以著治法臨產之工庶有所憑司命之寄亦可無負難產問難產者何也曰前章已備矣多因產母倉皇坐草太早或胞漿雖破兒身未轉或轉未順被母用力努貢以致足先來者謂之逆產手先來者謂之橫產或漏其肩與耳與額者謂之側產或被臍帶纏絆不得下者謂之礙產倉卒之間二命所繫不可無法而隘為仁之術也救逆產令其產母正身仰臥務要定心定神不可驚怪卻求慣熟穩婆剪去指甲以香油潤手將兒足輕輕送入又再推上兒身必轉直待身轉頭正然後服前催生之藥渴則飲以蜜水飢則食以薄粥然後扶掖起身用力一送兒即生矣此在穩婆之良若粗率蠢人不可用也切不可使針刺足心及鹽塗之法兒痛上奔母命難存救橫產法當如上前截云仍將兒手輕輕送入再推上摸定兒肩漸漸扶正令頭順產門後進催生之藥飲食之物一切如上扶正兒即下矣忌用針刺救側產亦令母仰臥法如上穩婆用燈審視或肩或額偏左偏右務得其實以手法輕輕扶撥令正仍服藥食如前法起身用力兒即下矣救礙產令母仰臥穩婆用燈審視看臍帶絆著兒之何處仔細以手法輕輕取脫服藥食如前法扶起用力一送即下矣盤腸生問盤腸生者何曰當產之時母腸先出盤露於外子隨後生生後而腸不即收此謂盤腸生也苦不忍見蓋由平日氣虛不能斂束血熱易於流動下元不固關鍵不牢致此苦惡救治之法於子下衣來之後卻令產母仰臥穩婆先將母腸溫水洗淨惹帶之物然後托起輕輕送入推而上之卻令產母兩足挾緊穀道其腸自收上也或取蓖麻子四十九粒去殼搗爛敷在頂心待腸收盡而急去之次也或用冷水和醋令人噴面一噴一收以漸收之又其次也欲免其苦者宜於此後無孕時多服地黃丸加五味子一兩桂一兩以固下元之關鍵及有孕時多服胡連丸加人參一兩以補氣又服三補丸以涼血如滑胎瘦胎之藥不可輕服於八月之時再服八物湯加訶子瞿麥粟殼連服十餘劑庶可免矣產子氣絕不啼問云云者何曰子欲下時母護其疼傴僂傾側兩足不開扭挾兒頭氣不得伸故生下悶絕不啼謂之寤生救法待胎衣來切勿斷臍急取小鍋燒水以胎衣置湯中頻頻用水洗臍帶須臾氣暖入腹兒氣即回而啼聲發出矣若倉卒斷其臍帶不可救矣子死腹中問云云者何曰兒當欲下之時被母護疼兩足不開夾其頭而死者或因產母掙挫忍耐當直之人不善扶掖緊抱其腰以致傷胎而死者或因產難胞漿已干生路漸塞子不得出氣閉而死者或因生路不順若逆側等證穩婆蠢厲用手莽撞反傷其子而死者或被臍帶纏頸氣絕而死者其候但觀其母口青手指青臍下冷口中有臭氣者子死腹中的矣急用加味五苓散奪命丹取去死胎以保其母穩婆善取者尤妙如母唇面俱青則難救矣胎衣不下問云云者何曰或因產母力乏氣不轉運或因血少乾澀或因子宮空虛吸貼而不下者急服加味五苓散甚快若倉卒無藥可尋路上破草鞋一隻近陰處輕系臍帶數道令下務宜仔細緊束系定然後斷其臍帶洗兒收養產母任其坐臥行立胎衣自下有過旬日而爛下者屢試有驗若不斷帶使子氣貫入衣中衣轉浮脹而不得出矣天寒之時猶不便於子也惟慣熟穩婆善取胎衣者甚不勞力產後血暈問云云者何曰新產婦昏眩卒倒不省人事口噤氣冷謂之血暈此惡候也不可救者多若誤作暗風庸醫殺之耳蓋由坐草之時不知用前防血暈等方所以有此其證有二當分治之有如血來太多卒然昏僕者此血氣兩虛也急用韭醋嗅法以待其醒清魂散主之澤蘭葉人參各一錢荊芥穗川芎歸身各二錢炙草八分酒水各一盞煎一盞入童便一鍾同服如血去少惡露未盡腹中有痛而昏眩者同上法令醒黑神散主之黑豆炒一合熟地當歸桂去皮乾薑炮炙草白芍酒炒生蒲黃各二錢酒水各一盞入童便一鍾服產後子宮脫出問云云者何曰其人素虛產時用力努貢太過以致脫出自不能收也宜用補中益氣湯主之外用洗法荊芥穗藿香葉臭椿木根白皮等分銼碎煎水無時洗之子宮即入產後乍見鬼神問云云者何曰心主血血去太多心神恍惚睡夢不安言語失度如見鬼神俗醫不知呼為邪祟誤人多矣茯神散主之茯神柏子仁遠志人參當歸酒洗生地酒洗炙草各一錢桂心五分獖豬心一個法如上煎服調辰砂一錢食後服如心下脹悶煩躁昏亂狂言妄語如見鬼神者此敗血停積上干於心心不受觸便成此證芎歸瀉心湯主之歸梢川芎玄胡索蒲黃牡丹皮各一錢桂心七分水煎調五靈脂另研末一錢食後服產後心痛問云云者何曰心者血之主其人宿寒內伏因產大虛寒持於血血凝不行上衝心之絡脈故心痛也但以大岩蜜湯治之寒去則血脈行而經絡通心痛自止若誤以為敗血攻之則虛與寒益甚漸傳心之正經變為真心痛而死矣生地酒洗歸身酒洗獨活吳茱萸炒白芍酒炒乾薑炮炙草桂心小草即遠志苗各一錢細辛五分水煎熱服產後腹脹滿悶嘔吐噁心問云云者何曰敗血散於脾胃脾受則不能運化津液而成腹脹胃受則不能受水穀而生嘔逆若以尋常脹嘔之劑治之則藥不對證反增其病宜用抵聖湯主之赤芍半夏湯泡澤蘭葉陳皮去白人參各二錢炙草一錢生薑焙五分水煎服亦有傷食而腹脹嘔逆者以脈辨之因於血則脈弦澀不惡食而嘔多血腥因於食則脈弦滑惡食而嘔多食臭加味平胃散主之蒼朮泔水浸焙厚朴姜炒陳皮香附醋炒人參各二錢炙草生薑焙各五分神麯炒一錢水煎熱服或用睍睆丸亦佳睍睆丸良薑炒薑黃炒蓽澄茄陳皮去白莪朮煨三稜煨人參各等分共為末蘿蔔漫火煮熟研為末和藥將余汁打粬糊為丸蘿蔔湯下加味六君子湯治產後傷食嘔吐腹脹滿人參五分白朮七分陳皮一錢半夏泡七分白茯二分炙草三分枳實麩炒五分山楂五分薑黃二分姜三片引水煎食遠服產後口乾痞悶問云云者何曰由血氣太虛中氣未足食麵太早脾胃不能消化面毒結聚於胃上熏胸中是以有此症也慎勿下之睍睆丸主之若其人臟氣本虛宿夾積冷胸腹脹痛嘔吐噁心飲食減少亦因新產血氣暴虛風冷乘之以致寒邪內勝宿疾益加吳茱萸湯主之吳茱萸炒一錢半桔梗乾薑炒炙草半夏細辛當歸酒白茯苓桂心陳皮生薑引水煎熱服若因胎衣未下惡露不來肚腹脹大繃急如鼓嘔吐黃水多帶腥臭加喘者死若因產後多疾妄投湯丸重虛其內肌肉消削精神疲睏血少氣乏乾嘔者死產後咳嗽問云云者何曰產後多因惡露上攻流入肺經乃成咳嗽其症胸膈脹悶宜服二母湯主之知母貝母白茯苓人參各一錢杏仁桃仁各二錢水煎食後溫服又曰肺主氣氣為衛所以充皮毛密腠理也產後氣虛衛虛皮毛不充腠理不密風寒襲之先入於肺亦成咳嗽其症發熱惡寒鼻塞後重或多噴嚏鼻流清涕旋覆花湯主之旋覆花赤芍前胡半夏荊芥穗甘草白茯苓五味麻黃去根節杏仁各等分姜五棗三引煎服同前有汗者去麻黃加桂枝如咳久不止涕唾稠黏加味甘桔湯主之甘草桔梗款冬貝母前胡枳殼白茯苓五味麥冬各等分淡竹葉十五皮煎服同前如產後吃鹽太早者難治產後喉中氣急喘促問云云者何曰榮者血也衛者氣也內水流通榮衛相隨產後血下過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絕陰最為難治急取鞋底炙熱於小腹上下熨之次取奪命丹主之附子炮去皮臍半兩牡丹皮去木乾漆渣炒煙盡各一兩共末用釅醋一升大黃末一兩同熬成膏和末為丸梧子大每服五十丸溫酒下又問產後血入於肺面赤發喘欲死者參蘇飲主之人參末一兩蘇木二兩水三盞煎一盞去木人參末隨時加減服效難盡述產後腰痛問云云者何曰女人之腎胞脈所繫產後下血過多則胞脈虛脈虛則腎氣虛腎主腰故令腰疼利腎地黃湯主之其症隱隱痛熟地黃歸身酒杜仲鹽水炒焦獨活桂心續斷各一錢生薑三片棗二枚水煎空心服又曰敗血流入腎經帶脈阻塞有腰痛者其症脹痛如刺時作時止手不可近加味復元通氣散主之歸身酒川芎小茴炒破故紙炒捶玄胡牛膝桂心各一錢丹皮一錢水煎木香五分磨水和之更調乳香沒藥末各五分服有因產時起伏䦛䦟挫閃腎氣及帶脈者亦或腰疼用上散方產後遍身疼痛問云云者何曰產時骨節開張血脈流散元氣衰弱則經絡肉分之間血多凝滯骨節不利筋脈不舒故腰背不能轉側手足不能屈伸而痛也勿作風寒用汗之劑宜趁痛散主之當歸酒全用桂白朮牛膝酒浸黃耆獨活生薑各一錢炙草薤白各五分水煎服又有因新產氣虛久坐多語運動用力遂致頭目昏眩四肢疼痛寒熱如瘧自汗名曰蓐勞勿作傷寒誤投汗劑白茯苓散主之白茯苓歸身川芎桂心白芍酒炒黃耆炙人參熟地各一錢獖豬腰子一對去脂膜切片煎湯一盞去腎姜三片棗二枚引同藥煎服予按蓐勞之證或因臨產之時生理不順憂恐思慮內傷其神輾轉䦛䦟外勞其形內外俱傷形神皆瘁或因新產之後氣血未復飲食未充起居無度語言不止調攝失宜情欲失禁外感風寒內傷飲食漸成羸疲百病俱作苟非良工妙劑鮮有不成癆瘵而斃者必宜常服十全大補湯又早用地黃丸加歸身牛膝肉蓯蓉去甲酒洗五味柏子仁各二兩日服人參白朮散作丸服之常煮腰子粥以助之大效腰子粥煮法取獖豬腰子一對去脂膜薄切如柳葉大用鹽酒拌合一時水三盞粳米三合瓦罐煮粥入蔥花椒末調和得宜食之產後腹痛問云云者何曰女人之血未有胎時則為經水經水不來則病產時則為惡露惡露不來則病故產婦中氣多虛不能行血血斯凝滯或閉而不來或來而不盡敗血入腹故為腹痛乍作乍止其痛如刺手不可近黑神散主之蓋敗血隨其所止之處無不成病或產後血虛外受風冷之氣內傷寒冷之物以致腹痛者得人按摩略止或熱物熨之略止者是也當歸建中湯主之歸身酒洗白芍酒炒桂心炙草各二錢生薑五片大棗三枚水煎入飴湯三匙攪勻熱服或小腹痛者臍下胞胎所繫之處血之所聚也產後血去不盡即成痛症其症無時刺痛痛則有形須臾痛止又不見形黑神散主之黑神散熟地黃蒲黃炒當歸乾薑煨桂心白芍藥甘草各四兩黑豆炒去皮半升上為細末每服二錢好酒童便各半盞同煎服又有因產時寒氣客於子門入於小腹或坐臥不謹使風冷之氣乘虛而入此寒疝也但不作脹且無形影為異金鈴子散主之川楝子去核小茴炒破骨脂桂心木香汁各一錢姜引水煎入木香汁食前熱服產後兒枕痛問云云者何曰腹中有塊上下時動痛不可忍此由產前聚血產後氣虛惡露未盡新血與故血相搏而痛俗謂之兒枕痛即血瘕之類也當歸玄胡索湯主之當歸身尾酒洗玄胡索各一錢半五靈脂蒲黃各一錢赤芍桂心各七分紅花五分酒水各一盞煎一盞入童便一杯同服又羊肉湯通治上腹痛小腹痛兒枕痛之神方也專治虛羸精羊肉四兩當歸酒洗川芎各五錢生薑一兩水十盞煎三盞分四服產後頭痛問云云者何曰人身之中氣為陽血為陰陰陽和暢斯無病蓋產後去血過多陰氣已虧陽氣失守頭者諸陽之會上湊於頭故為頭痛但補其陰血則陽氣得從而頭痛自止芎歸湯主之川芎當歸用酒洗各五錢蔥白連須五根生薑焙乾五片水煎食後服又有敗血停留子宮厥陰之位其脈上貫頂巔作頂巔痛者黑神散主之產後發熱問云云者何曰產後血虛則陰虛陰虛生內熱其症心胸煩滿呼吸短氣頭痛悶亂晡時轉甚與大病後虛煩相似人參當歸散主之人參歸身酒洗熟地桂去皮白芍酒炒各一錢半麥冬去心一錢水二盞先以粳米一合淡竹葉十片煎至一盞去米葉入藥並棗三枚煎七分溫服熱甚加炒姜一錢產後大熱必用乾薑何也曰此非有餘之熱乃陰虛生內熱也故以補陰藥大劑服之且乾薑能入肺和肺氣入肝引血藥生血然不可獨用必與補陰藥同用此造化自然之妙惟天下至神可以語此產後乍寒乍熱似瘧問云云者何曰敗血未盡陰陽不和皆能發寒熱也何以別之曰敗血為病則小腹刺痛此為異耳故敗血未盡者以去滯為主陰陽不和者以補虛為主若作瘧治誤矣問敗血不盡乍寒乍熱者何曰敗血留滯則經脈皆閉榮衛不通閉於榮則血甚而寒閉於衛則陽甚而熱榮衛俱閉則寒熱交作榮衛氣行則即解矣惟黑神散卷荷散為去血之要藥也卷荷散初出卷荷焙乾紅花歸尾蒲黃牡丹皮各一錢生地一錢生薑三片童便一碗水煎熱服問陰陽不和乍寒乍熱者何曰產後氣血虧損陰陽俱虛陰虛則陽勝而熱陽虛則陰勝而寒陰陽俱虛則乍寒乍熱增損四物湯主之歸身酒洗白芍酒洗川芎乾薑炒焦黑人參各一錢炙草五分姜三片棗三枚水煎服寒多熱少者加桂一錢熱多寒少者加柴胡一錢乾薑減半煩渴者加知母麥冬各一錢食少者加陳皮白朮各一錢虛倦甚者加黃耆蜜炙一錢問似瘧真瘧何以別之曰似瘧寒不凜凜熱不蒸蒸發作無時亦不甚苦此正氣虛而無邪者也真瘧者寒則湯火不能御熱則冰水不能解發作有時煩苦困頓此正氣虛而邪氣相搏者也產後瘧疾問云云者何曰氣血俱虛榮衛不固脾胃未復或外感風寒內傷飲食皆能成瘧又有胎前病瘧產後未愈者產後之瘧最難調理只以補虛扶正為主正氣勝則邪氣自退不可輕用截藥重虛正氣為害甚大增損柴胡四物湯主之北柴胡人參半夏炙草歸身酒洗川芎乾薑桂姜三片棗三枚水煎不拘時服久瘧加黃耆蜜炙鱉甲醋炙各一錢產後渴問云云者何曰胃者水穀之海津液之府也產後去血甚多津液內耗胃氣暴虛頓生內熱故口燥咽乾而渴也加人參麥冬湯主之人參麥冬生地瓜蔞根炙草各二錢先取淡竹葉十片粳米一合煎湯一盞去米葉加生薑三片棗二枚煎七分溫服產後汗出不止兼變證問云云者何曰血為榮行乎脈中氣為衛行乎脈外相須為守者也產後去血過多榮血不足衛氣失守不能斂皮毛固腠理故汗泄而易出也宜急止之恐風寒乘虛而入變生他症宜麻黃根湯主之歸身酒洗黃耆蜜炙麻黃根人參炙草一錢半牡蠣煅另研水二盞以浮麥一合煮至一盞去麥入藥再煎至七分調牡蠣粉二錢服之如眩暈汗出者此名冒汗虛極也急用黃耆炙人參炙草各二錢附子制一錢水煎斡開口灌之大抵此危症多不可救如汗不止風邪乘之忽然悶倒口眼喎斜手足攣曲如角弓反張者此痓病也急用桂枝葛根白芍炙草炙耆歸身各二錢熟附五分斡開口灌之此亦危症不治者多產後中風問云云者何曰產後正氣暴虛百節開張風邪易入調理失宜風即中之不省人事口自蠕動手足攣曲身如角弓此風外中者也愈風湯主之羌活防風當歸酒洗川芎白芍酒炒桂黃耆天麻秦艽各二錢薑棗引水煎熱服又曰諸風振掉皆屬肝木肝為血海胞之主也產後去血過多肝氣暴虛內則不能養神外則不能養筋以致神昏氣少汗出膚冷眩暈卒倒手足瘈瘲此肝虛生風風自內生者也用當歸建中湯加黃耆人參各一錢熟附五分薑棗引不用飴湯如痰迷心竅神氣不清恍惚昏眩者用琥珀壽星丸人參煎湯下產後傷寒問云云者何曰氣血俱虛榮衛不守起居失節調養失宜傷於風則衛受之傷於寒則榮受之而成傷寒也只以補虛為主隨證以末治之五物湯人參歸身川芎白芍酒炒炙草等分姜三片蔥白三根引水煎服有汗曰傷風本方加桂枝防風無汗曰傷寒本方加麻黃蘇葉寒熱往來本方加柴胡頭痛本方加藁本細辛遍身痛本方加羌活蒼朮但熱不惡寒本方加柴胡葛根發熱而渴本方加知母麥冬淡竹葉產後霍亂吐瀉問云云者何曰脾胃者氣血之本也產後血去氣損脾胃亦虛風冷易乘飲食易傷少失調理即有霍亂心腹絞痛手足逆冷吐瀉並作加味理中湯主之人參白朮炙草乾薑炮陳皮藿香厚朴薑汁炒生薑焙五片水煎溫服無時產後泄瀉問云云者何曰產後中氣虛損寒邪易侵若失調理外傷風寒內傷生冷以致脾胃疼痛泄瀉不止理中湯主之如泄不止者再加肉豆蔻麵包煨共末蜜丸米飲下產後痢疾問云云者何曰濕多成泄暴注下迫皆屬於熱赤白痢者乃濕熱所為也故赤者屬熱自小腸而來白者屬濕從大腸而來俗云赤為熱白為寒非也無積不成痢蓋由產母平日不肯忌口傷於飲食停滯於中以及中氣虛損不能調理宿積發動而為痢也亦有因子下之時說腹中空虛縱食雞蛋與雞之類以補虛殊不知食飲自倍脾胃乃傷脾胃氣弱難以克化停滯而成痢也務宜詳審斟酌以施治法庶不誤人矣如果新產之時飲食過傷者其症腹中脹痛裡急窘迫身熱口渴六脈數實宜下之加味小承氣湯主之枳實麩炒厚朴姜炒各二錢大黃酒炒二錢五分檳榔一錢半炙草一錢生薑三片水煎熱服以快便為度中病即止後用四君子湯加陳皮和之如新產後未有所傷其症其脈與上卻同者此宿食為病也宜消而去之枳實湯主之枳實麩炒木香炙草各一錢厚朴薑製二錢檳榔一錢五分生薑三片水煎服快利為度後以四君子湯加陳皮和之如無新舊食積下痢赤白腹痛窘迫脈沉數者此虛痢也宜行氣和血為主當歸芍藥湯主之歸身白芍酒人參白茯各一錢炙草木香各五分枳殼炒七分黑乾薑二分陳皮一錢烏梅一個水煎食前服如久痢不止者此氣虛血少腸滑不禁也宜四君子湯加白芍烏梅罌粟殼大棗主之又有產後惡露不下以致敗血滲入大腸而利鮮血者腹中刺痛里不急後不重是也用枳殼麩炒一錢半荊芥穗略炒二錢五分水煎服神效產後大便閉澀不通問云云者何曰人身之中腐化糟粕運行腸胃者氣也滋養津液溉溝瀆者血也產後氣虛而不運故糟粕壅滯而不行血虛而不潤故溝瀆乾澀而不流大便不通乃虛秘也不可誤用下劑反加閉澀宜潤燥湯主之人參甘草各五分歸身梢生地枳殼各一錢火麻仁去殼捶碎二錢桃仁泥二錢檳榔磨汁五分先將上六味煎後入桃泥末二錢入檳榔汁服更用蘇麻粥真蘇子一合火麻子三合共擂爛以水一盞濾汁又擂取汁渣盡為度用汁和粳米煮粥食之甚效老人虛秘尤宜常用產後小便不通或短少問云云者何曰膀胱者州都之官津液藏焉氣化則能出矣產後氣虛不能運化流通津液故使小便不通雖通而亦短少也勿作淋秘輕用滲利之藥其氣益虛病亦甚宜加味四君子湯主之人參白朮白茯炙草麥冬車前子各一錢桂心五分姜三片水煎食前服又有惡露不來敗血停滯閉塞水瀆小便不通其症小腹脹滿刺痛乍寒乍熱煩悶不安加味五苓散主之豬苓澤瀉白朮茯苓桂各一錢桃仁紅花各二錢水煎服產後淋問云云者何曰此亦血去陰虛生內熱證也蓋腎為至陰主行水道去血過多真陰虧損一水不足二火更甚故生內熱小便成淋而澀痛也加味導赤散主之生地赤芍木通去皮甘草梢麥冬去心黃柏知母桂心各一錢燈心四十七寸水煎調益元散二錢服問前言小便不通後言淋閟二證何別曰不通者屬氣虛不通淋屬內熱澀痛以此別之產後尿血問云云者何曰小腹痛者乃敗血流入膀胱小腹不痛但尿時澀痛者乃內熱也並用小薊湯主之小薊根生地赤芍木通蒲黃甘草梢淡竹葉各一錢滑石二錢燈心四十九寸水煎敗血加歸梢紅花各一錢兼內熱加黃芩麥冬各一錢產後小便數及遺尿不禁問云云者何曰下焦如瀆所以主瀦泄也產後氣血虛脫溝瀆決裂瀦蓄不固水泉不止故數而遺也下者舉之脫者澀之宜用升陽調元湯合桑螵蛸散主之人參黃耆炙炙草升麻益智子去殼炒各一錢五分薑棗引水煎調桑螵蛸散服真桑螵蛸白龍骨煅牡蠣左顧者煅各等分細研末每服三錢入湯調服又有產前穩婆用手誤犯胞破者以致小便不禁宜用參朮湯主之人參二錢半白朮二錢桃仁陳皮白茯苓各一錢炙耆一錢五分炙草五分豬胞或羊胞一個洗淨水二盞煮至一盞去胞入藥煎七分食前多服乃佳產後咳逆問云云者何曰此氣從胃中出上衝賁門吃忒而作聲也有胃氣虛寒者有中氣不足衝任之火直犯清道而上者有飲水過多水停而逆者有大小便閉下焦不通其氣上逆者有胃絕者大約產後咳逆乃胃虛氣寒證也加味理中湯主之人參白朮炙草乾薑炮陳皮各一錢丁香五分乾柿蒂二錢水煎服有熱去丁香加竹茹二錢如虛羸太甚飲食減少咳逆者胃絕也難治產後浮腫問云云者何曰新產之後敗血不盡乘虛流入經絡與氣相雜凝滯不行腐化為水故令四肢浮腫乍寒乍熱勿作水氣治之輕用滲利之劑但服調經湯使氣血流行其腫自消調經湯主之歸身酒洗赤芍牡丹皮桂心赤茯苓炙草陳皮各一錢細辛乾薑炒各五分姜引水煎服又有產後虛弱腠理不密調理失宜外受風濕面目虛浮四肢腫者加味五皮湯主之桑白皮陳皮生薑皮茯苓皮大腹皮漢防己枳殼炒豬苓炙草姜引水煎服產後惡露不止問云云者何曰產後衝任損傷氣血虛憊舊血未盡新血不斂相併而下日久不止漸成虛勞當大補氣血使舊血得行新血得生不可輕用固澀之劑使敗血凝聚變為癥瘕反成終身之害十全大補湯主之如小腹刺痛者四物湯加玄胡索蒲黃炒乾薑炒主之產後惡露不下問云云者何曰此有二證治各不同或因子宮素冷停滯不行者黑神散主之此必小腹脹滿刺痛無時也或因脾胃素弱中氣本虛敗血亦少氣乏血阻不能盡下其症乍痛乍止痛亦不甚加減八珍湯主之人參白朮白茯炙草歸身川芎赤芍熟地玄胡香附薑棗引水煎食前服產後眼見黑花昏眩問云云者何曰惡露未盡敗血流入肝經肝經開竅於目故眼見黑花諸風振掉皆屬肝木故為昏眩用前清魂散加牡丹皮一錢煎服如前產後脅痛問云云者何曰此亦敗血流入肝經厥陰之脈循行脅肋故為脅痛證有虛實宜分治之不可誤也如脅下脹手不可按是瘀血也宜去其血芎歸瀉肝湯主之歸尾川芎青皮枳殼香附便浸紅花桃仁各二錢水煎入童便一鍾酒一鍾服如脅下痛喜人按其氣閃動肋骨狀若奔豚者此去血太多肝臟虛也當歸地黃湯主之歸身白芍熟地俱酒洗人參甘草陳皮桂各錢半薑棗引水煎產後不語問云云者何曰人心有七孔三毛產後虛弱敗血停積閉於心竅神志不能明瞭故多昏瞶又心氣通於舌心氣閉則舌強不語七珍散主之人參石菖蒲生地川芎各一錢細辛三錢防風五分辰砂研五分水煎調辰砂食後服又有語言不清含糊蹇澀者蓋心主血血去太多心血虛弱舌乃心之苗其血不能上榮於舌萎縮卷短語之不出也加味參麥散主之人參麥冬歸身生地炙草石菖蒲各一錢五味子十三粒獖豬心一個劈開水二盞煮至一盞半去心入藥煎七分食後服又治怔忡有效產後暴崩問云云者何曰產後衝任已傷氣血未復或恣欲勞動胞脈或食辛熱鼓動相火或因惡露未盡固澀太速以致停留一旦復行須要詳審先用四物湯倍加芎歸再加人參作大劑服之扶其正氣然後隨其所傷加減調治因於房勞者本方加黃耆炙草阿膠炒艾葉同服因於辛熱者本方加白朮白茯甘草黃連炒因於劫澀者本方加香附桃仁崩久不止只用本方調十灰散服之蓋崩本非輕病產婦得之是謂重虛尤不可忽也產後瘕塊問云云者何曰此惡露不盡之害也蓋由新產惡露不來或來不盡或產婦畏藥雖有痛苦強忍不言或主人與醫堅執產後虛補之說不可輕用去血之藥以致敗血停留久而不散結聚成塊依附子宮妨礙月水阻絕嗣息夭其天年欲治此者必用丸藥以漸磨之非湯散旬日之力熟地二兩香附醋製四兩山茱萸去核二兩牡丹皮去木一兩五錢桂一兩歸身二兩川芎二兩三稜醋煮煨一兩莪朮醋煮煨一兩九肋鱉甲去肋醋炙枯一兩桃仁另研一兩五靈脂一兩五錢玄胡素炒破故紙炒各一兩木香一兩蜜丸每空心服五十丸白朮陳皮湯下此證惟坐馬丹方見效如神瓦楞子破瘕聖藥也萬氏未注此一方或者因方駭眾故不注耶產後玉戶不斂問云云者何曰女子初產身體纖柔胞戶窄小子出不快乃致拆裂漸次潰爛日久不斂宜內服十全大補湯外又用敷藥白芨白龍骨訶子肉爛蜂殼黃柏炒等分為細末先用野紫蘇煎洗拭乾以此藥搽之即效又烏龜殼入干夜合草於內塞滿燒煙燻之自合產後乳汁不通問云云者何曰或初產之婦則乳方長乳脈未行或產多之婦則氣血虛弱乳汁短少並用加味四物湯歸身人參川芎赤芍生地桔梗甘草麥冬白芷各一錢如因乳汁不行身體壯熱胸膈脹悶頭目昏眩者加木通滑石末水煎食後服更煮豬蹄湯食之則乳汁自行豬蹄一對洗淨煮爛入蔥調和並汁食之又云要入香油炒穿山甲共煮去甲食之才好
